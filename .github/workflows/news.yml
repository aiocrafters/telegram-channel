name: Google News to Telegram

on:
  schedule:
    - cron: "30 1 * * *"  # Every day at 7:00 AM IST (1:30 AM UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-bot
  cancel-in-progress: true

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python (with cache)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Ensure required files exist
        run: |
          [ -f seen_news.json ] || echo "[]" > seen_news.json
          [ -f summary_cache.json ] || echo "{}" > summary_cache.json

      - name: 🚀 Run News Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python main.py

      - name: 💾 Commit cache updates (safe)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add seen_news.json summary_cache.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen + summary cache"
            git push
          fi